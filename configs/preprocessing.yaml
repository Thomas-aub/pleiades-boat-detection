# =============================================================================
# configs/preprocessing.yaml
# =============================================================================
# Master configuration for the SAHI-optimised Global Preprocessing Pipeline.
#
# Strategy shift vs. the old tiling pipeline
# -------------------------------------------
# OLD: Tile raw GeoTIFFs → 320 px patches → annotate per-patch → split.
#      YOLO trained on small crops; SAHI not used at training time.
#
# NEW: Process full GeoTIFF globally (radiometric + spatial) → annotate
#      against the global image → split at image level.
#      SAHI handles all slicing at inference time.
#
# Pipeline stages (set enabled: false to skip any stage)
# -------------------------------------------------------
#   1  radiometric   — percentile stretch + gamma on the full GeoTIFF
#   2  spatial       — Lanczos-4 upsampling via windowed rasterio I/O
#   3  annotations   — GeoJSON OBB → YOLO OBB (global normalisation)
#   4  split         — image-level train / val / test (zero spatial leakage)
#   5  tiling        — raw GeoTIFF tiling + YOLO OBB label projection
# =============================================================================

# ---------------------------------------------------------------------------
# I/O paths  (relative to project root, or absolute)
# ---------------------------------------------------------------------------
paths:
  raw_dir:          "data/eval/raw50"                   # source GeoTIFFs + GeoJSONs
  processed_dir:    "data/eval/processed"             # root for all processed artefacts
  radiometric_dir:  "data/eval/processed/radiometric" # stage 1 output
  spatial_dir:      "data/eval/processed/spatial"     # stage 2 output
  labels_dir:       "data/eval/processed/labels"      # stage 3 output (pre-split .txt)
  dataset_dir:      "data/eval/dataset"               # stage 4 output  {train,val,test}/
  tiled_dir:        "data/eval/dataset/tiled"         # stage 5 output  {train,val,test}/

# ---------------------------------------------------------------------------
# Stage registry — controls which stages are executed and in what order.
# Remove or set enabled: false to skip a stage without changing the code.
# ---------------------------------------------------------------------------
stages:
  - id: 1
    name: radiometric
    enabled: true
  - id: 2
    name: spatial
    enabled: true
  - id: 3
    name: annotations
    enabled: true
  - id: 4
    name: split
    enabled: true
  - id: 5
    name: tiling
    enabled: true

# ---------------------------------------------------------------------------
# Stage 1 — Radiometric normalisation  (src/preprocessing/steps/radiometric.py)
# ---------------------------------------------------------------------------
radiometric:
  # Percentile clipping: pixel values below lo_pct or above hi_pct are clamped.
  lo_percentile: 1.0
  hi_percentile: 99.9

  # Gamma correction applied after percentile stretch.
  # gamma < 1.0 → brightens shadows (recommended for boat detection).
  gamma: 0.8

  # 1-based band indices to export as (R, G, B).
  # null → auto-detect: ≥3 bands uses first three; 1-band (PAN) replicates to RGB.
  # Example for a 4-band BGRN image with true-colour RGB: [3, 2, 1]
  bands: null

  # GeoTIFF compression applied to every processed image.
  compress: "lzw"

# ---------------------------------------------------------------------------
# Stage 2 — Spatial upsampling  (src/preprocessing/steps/spatial.py)
# ---------------------------------------------------------------------------
spatial:
  upscale_ratio: 4

  # Upsampling interpolation algorithm.
  # Options (rasterio Resampling enum names):
  #   lanczos  — sharpest edges, best for downsampling, slight ringing risk
  #   cubic    — good quality, no ringing  (recommended for upsampling)
  #   bilinear — fast, noticeably softer
  interpolation: "cubic"

  # Tile size used internally for windowed rasterio I/O.
  # Larger values are faster but consume more RAM.  512 is safe for ≤16 GB RAM.
  window_size: 1536

  # GeoTIFF compression for the output.
  compress: "lzw"

# ---------------------------------------------------------------------------
# Stage 3 — Annotation conversion  (src/preprocessing/steps/annotations.py)
# ---------------------------------------------------------------------------
annotations:
  # Minimum fraction of an OBB's area that must be visible inside the
  # image boundaries for the annotation to be included.
  # For global images this is rarely triggered (only for objects right
  # on the edge of the sensor swath).
  min_visible: 0.00

  # Minimum side length in pixels (in the output image space) for any OBB
  # axis.  Boxes smaller than this are symmetrically elongated from their
  # centre to reach min_size_px.
  min_size_px: 2.0

  # GeoJSON class_id → YOLO class_id remapping.
  # Classes absent from this map AND not in skip_classes emit a warning.
  class_map:
    0: 0   # Pirogue
    1: 1   # Double_hulled_Pirogue
    2: 2   # Small_Motorboat
    3: 3   # Medium_Motorboat
    4: 3   # Large_Motorboat
    5: 3   # Sailing_Boat
    6: 3   # (merged into Large_Motorboat)
    8: 0
    10: 0

  # GeoJSON class IDs to discard entirely — no label line is written.
  skip_classes: [9, 11]

# ---------------------------------------------------------------------------
# Stage 4 — Image-level train / val / test split  (src/preprocessing/steps/split.py)
# ---------------------------------------------------------------------------
split:
  train_ratio: 0.0
  val_ratio:   0.0
  test_ratio:  1.00

  # Class IDs that receive extra scoring weight during greedy assignment,
  # preventing rare classes from landing entirely in one split.
  priority_class_ids: [0, 1]   # Pirogue, Double_hulled_Pirogue
  priority_weight:    5.0       # higher → rarer classes balanced more aggressively

  # Fixed seed guarantees reproducible splits across pipeline reruns.
  random_seed: 42

  # Copy mode: if true, files are copied to dataset_dir and originals kept.
  # If false, files are moved (saves disk space).
  copy: false

# ---------------------------------------------------------------------------
# Stage 5 — Raw GeoTIFF tiling  (src/preprocessing/steps/tiling.py)
# ---------------------------------------------------------------------------
# Reads the split dataset produced by Stage 4 and slices every selected
# split into fixed-size GeoTIFF patches with matching YOLO OBB label files.
#
# No radiometric or spatial processing is applied — raw pixel values, source
# dtype, band count, CRS, and Affine transform are all preserved verbatim.
#
# Input layout (Stage 4 output):
#   dataset_dir/images/{split}/*.tif
#   dataset_dir/labels/{split}/*.txt
#
# Output layout:
#   tiled_dir/{images_subdir}/{split}/{stem}_{x_off}_{y_off}.tif
#   tiled_dir/{labels_subdir}/{split}/{stem}_{x_off}_{y_off}.txt
# ---------------------------------------------------------------------------
tiling:
  # Which dataset splits to tile.  Must be a subset of the directories
  # created by Stage 4.  Remove any entry to skip that split entirely.
  splits:
    - test

  # Output tile height and width in pixels.  Edge tiles are padded with the
  # source nodata value (or 0 when nodata is not defined) to this exact size.
  # No radiometric processing is applied — raw pixel values are preserved.
  tile_size: 2048

  # Pixel overlap between adjacent tiles in both axes.
  # Effective stride = tile_size - overlap.
  # Set to 0 for non-overlapping tiles.
  overlap: 256

  # GeoTIFF compression for the output tile files.
  compress: "lzw"

  # Minimum fraction of an OBB's area that must fall inside a tile for the
  # corresponding YOLO label line to be written to that tile's label file.
  # 0.00 → keep every annotation that touches the tile.
  # 0.10 → discard annotations that are less than 10 % visible in the tile.
  min_visible_frac: 0.10

  # Subdirectory names inside tiled_dir for tile images and label files.
  # Changing these lets you redirect outputs without touching the code.
  # Default values match the standard Ultralytics YOLO dataset layout.
  images_subdir: "images"
  labels_subdir: "labels"