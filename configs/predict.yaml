# =============================================================================
# configs/predict.yaml
# =============================================================================
# Master configuration for the full prediction pipeline.
#
# Two modes are supported (set under ``pipeline.mode``):
#
#   inference  — preprocess → predict → merge tiles into per-image GeoJSONs
#                → postprocess.  No GT is required.
#
#   evaluation — same as inference, then compares each postprocessed GeoJSON
#                against the matching ground-truth file, computes per-class
#                metrics, saves results.csv, plots and (optionally) writes a
#                labelled GeoJSON with TP / FP / FN / deleted annotations.
#
# Stage-level ``enabled`` flags let you skip any sub-pipeline without touching
# the code.  Set ``preprocessing.enabled: false`` to jump straight to
# prediction on already-processed tiles, for example.
# =============================================================================

# ---------------------------------------------------------------------------
# Pipeline mode
# ---------------------------------------------------------------------------
pipeline:
  # "inference" | "evaluation"
  mode: evaluation

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  weights: "gs_best.pt"

  # Human-readable class names indexed by YOLO class_id.
  class_names:
    0: Pirogue
    1: Double_hulled_Pirogue
    2: Small_Motorboat
    3: Other_boat

# ---------------------------------------------------------------------------
# I/O paths
# ---------------------------------------------------------------------------
paths:
  # Tiled GeoTIFF inputs for the predictor.
  # Typically the output of the tiling preprocessing stage.
  tiles_dir: "data/eval/dataset/tiled/images/test"

  # One GeoJSON is written here per source image after tile merging.
  predictions_dir: "data/eval/predictions/raw"

  # Output directory for postprocessed GeoJSONs.
  # Must match postprocessing.yaml → paths.postprocessed.
  postprocessed_dir: "data/eval/predictions/raw"

  # [evaluation mode only] Ground-truth GeoJSON files, one per source image.
  ground_truth_dir: "data/eval/raw"

  # [evaluation mode only] All evaluation outputs land here.
  results_dir: "predictions/results"

# ---------------------------------------------------------------------------
# Prediction (src/vessels_detect/predict/predictor.py)
# ---------------------------------------------------------------------------
prediction:
  conf:   0.20   # per-tile confidence threshold; detections below are dropped
  iou:    0.20   # YOLO internal NMS IoU threshold (per-tile, NOT global NMS)
  imgsz:  1024   # inference image size in pixels

  # Global cross-tile NMS — removes duplicates from overlapping tiles.
  global_nms_iou: 0.20

  # JSON indentation for the raw prediction GeoJSON files.
  geojson_indent: 2

# ---------------------------------------------------------------------------
# Preprocessing sub-pipeline
# ---------------------------------------------------------------------------
# Set enabled: false to skip preprocessing entirely (e.g. tiles already exist).
# When enabled, the PreprocessingManager is called with its own config file.
# Only the stages listed as enabled: true in that file will actually run.
preprocessing:
  enabled: true
  config:  "configs/preprocessing.yaml"

# ---------------------------------------------------------------------------
# Postprocessing sub-pipeline
# ---------------------------------------------------------------------------
# Set enabled: false to skip postprocessing (raw predictions are used as-is
# for evaluation or delivery).
# When enabled, the PostprocessingManager is called with its own config file.
postprocessing:
  enabled: true
  config:  "configs/postprocessing.yaml"

# ---------------------------------------------------------------------------
# Evaluation  (evaluation mode only)
# ---------------------------------------------------------------------------
evaluation:
  # IoU threshold for TP / FP / FN matching.
  iou_threshold: 0.20

  # When true, write a final labelled GeoJSON per image with
  # label ∈ {TP, FP, FN} and a "deleted" flag for postprocessing removals.
  generate_geojson: true

  # JSON indentation for the labelled evaluation GeoJSON files.
  geojson_indent: 2
