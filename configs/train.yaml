# =============================================================================
# configs/train.yaml
# =============================================================================
# All YOLO-OBB training hyperparameters for the boat detection model.
# Loaded by scripts/train.py → src/vessels_detect/models/yolo_trainer.py.
#
# Model loading mode is inferred automatically from model.weights:
#   *.pt   → Mode 3: direct checkpoint load (standard fine-tuning)
#   *.yaml → Mode 2: build from architecture + partial weight transfer
#              model.pretrained: path to the base *.pt for layer transfer.
#              Set model.pretrained: "" to train the custom arch from scratch.
#
# Set training.resume: true → Mode 1: resume from last.pt (weights below
# are ignored; the checkpoint path is derived from project/run_name).
# =============================================================================

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model:
  weights:    "weights/yolo26m-obb.pt"  # *.yaml or *.pt  (see mode table above)
  pretrained: ""        # base checkpoint for partial transfer
                                               # ignored when weights is a *.pt file
                                               # set to "" to train from scratch

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  task:         "obb"             # YOLO task type — must be "obb" for this pipeline
  dataset_yaml: "data/dataset.yaml"

  # ── Core ────────────────────────────────────────────────────────────────
  epochs:       100
  imgsz:        2048
  batch_size:   2
  workers:      4
  patience:     20                 # epochs without improvement before stopping;
                                  # 0 = disable early stopping entirely
  save_period:  30                # save a checkpoint every N epochs (0 = disabled)
  seed:         0                 # RNG seed for reproducibility
  amp:          true              # Automatic Mixed Precision (fp16 where safe)
  cache:        false             # cache images in memory: false | "ram" | "disk"

  # ── Optimiser ────────────────────────────────────────────────────────────
  optimizer:       "auto"         # SGD | Adam | AdamW | NAdam | RAdam | auto
  lr0:             0.005          # initial learning rate
  lrf:             0.1            # final LR = lr0 * lrf
  momentum:        0.937
  weight_decay:    0.0005
  warmup_epochs:   5.0
  warmup_momentum: 0.8
  warmup_bias_lr:  0.1
  nbs:             64             # nominal batch size for gradient accumulation scaling
  cos_lr:          false          # cosine LR schedule (true) vs linear decay (false)

  # ── Regularisation ───────────────────────────────────────────────────────
  label_smoothing: 0.0
  freeze:          10             # freeze first N backbone layers; 0 = no freeze

  # ── Run management ───────────────────────────────────────────────────────
  project:      "boat_obb"
  run_name:     "."
  device:       0                 # GPU index, or "cpu", or [0,1] for multi-GPU
  resume:       false
  verbose:      false
  plots:        true              # save metric plots and confusion matrix

# ---------------------------------------------------------------------------
# Augmentation
# ---------------------------------------------------------------------------
augmentation:
  # ── Photometric — safe for any label format ──────────────────────────────
  hsv_h: 0.015                    # hue shift (fraction of wheel)
  hsv_s: 0.2                      # saturation gain
  hsv_v: 0.1                      # value gain

  # ── Geometric — YOLO native (OBB-label-aware) ────────────────────────────
  mosaic:       0.7               # mosaic augmentation probability
  close_mosaic: 20                # disable mosaic for final N epochs
  degrees:      180.0             # rotation range ±degrees
  fliplr:       0.5               # horizontal flip probability
  flipud:       0.5               # vertical flip probability
  scale:        0.30              # scale jitter ±gain
  multi_scale:  0.0               # multi-scale probability (0 = disabled)
  perspective:  0.0               # perspective warp strength (0 = disabled)
  copy_paste:   0.0               # OBB-aware copy-paste probability (0 = disabled)